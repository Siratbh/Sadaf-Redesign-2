backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: "paintings"
    label: "Available Paintings"
    label_singular: "Available Painting"
    folder: "content/paintings"
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    filter:
      field: availability
      value: available
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe identifier, e.g. nocturnal-whispers" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Medium", name: "medium", widget: "string" }
      - { label: "Dimensions", name: "dimensions", widget: "string", required: false }
      - label: "Availability"
        name: "availability"
        widget: "select"
        hint: "Change to 'Sold' to move this piece to Past Works."
        options:
          - { label: "Available", value: "available" }
          - { label: "Sold", value: "sold" }
        default: "available"
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Thumbnail Image", name: "thumbnail_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Short Description", name: "short_description", widget: "text", required: false }
      - { label: "Full Description", name: "full_description", widget: "markdown", required: false }
      - { label: "Inquiry Subject Line", name: "inquiry_subject", widget: "string", required: false }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "string", required: false }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 99, required: false }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

  - name: "past-works"
    label: "Past Works"
    label_singular: "Past Work"
    folder: "content/paintings"
    create: false
    slug: "{{slug}}"
    identifier_field: slug
    filter:
      field: availability
      value: sold
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe identifier, e.g. nocturnal-whispers" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Medium", name: "medium", widget: "string" }
      - { label: "Dimensions", name: "dimensions", widget: "string", required: false }
      - label: "Availability"
        name: "availability"
        widget: "select"
        hint: "Change to 'Available' to move this piece back to Available Paintings."
        options:
          - { label: "Available", value: "available" }
          - { label: "Sold", value: "sold" }
        default: "sold"
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Thumbnail Image", name: "thumbnail_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Short Description", name: "short_description", widget: "text", required: false }
      - { label: "Full Description", name: "full_description", widget: "markdown", required: false }
      - { label: "Inquiry Subject Line", name: "inquiry_subject", widget: "string", required: false }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "string", required: false }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 99, required: false }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

  - name: "exhibitions"
    label: "Exhibitions"
    folder: "content/exhibitions"
    create: true
    slug: "{{year}}-{{slug}}"
    identifier_field: title
    fields:
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Start Date", name: "start_date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false, hint: "Optional. Leave blank to show year only." }
      - { label: "End Date", name: "end_date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false, hint: "Tick to highlight this exhibition at the top of /exhibitions. Up to two featured exhibitions show as Hero + NEXT; if fewer than two are flagged, the page auto-fills with the most recent exhibitions that have images." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "City", name: "city", widget: "string", required: false }
      - label: "Exhibition Type"
        name: "exhibition_type"
        widget: "select"
        options:
          - { label: "Solo", value: "Solo" }
          - { label: "Group", value: "Group" }
          - { label: "Residency", value: "Residency" }
          - { label: "Art Fair", value: "Art Fair" }
      - { label: "Hero Image", name: "hero_image", widget: "image", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions", hint: "Full-bleed image at the top of the detail page and the default image for featured slots on the listing." }
      - { label: "Card Thumbnail", name: "card_thumbnail", widget: "image", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions", hint: "Optional. Image used on the archive grid card. Falls back to Hero Image, then the first Gallery image if blank." }
      - { label: "Hero Video", name: "hero_video", widget: "file", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions", hint: "Optional. Upload an MP4 or paste a YouTube / Vimeo / Cloudinary URL. Replaces the Hero Image when set." }
      - { label: "Short Description", name: "description", widget: "text", required: false, hint: "Plain text. Shown as a teaser on the listing row." }
      - { label: "Body", name: "body", widget: "markdown", required: false, hint: "Long-form editorial content. Inline images use ![alt](url). Inline videos use the same syntax — paste any MP4, YouTube, Vimeo, or Cloudinary URL and it renders as a video." }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.caption}}"
        fields:
          - { label: "Image", name: "image", widget: "image", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions" }
          - { label: "Video", name: "video", widget: "file", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions", hint: "Upload MP4 or paste YouTube / Vimeo / Cloudinary URL. Replaces Image when set." }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - label: "Works Shown"
        name: "works_shown"
        widget: "relation"
        collection: "all-paintings-reference"
        search_fields: ["title", "year"]
        value_field: "slug"
        display_fields: ["title", "year"]
        multiple: true
        required: false
        hint: "Pick paintings shown at this exhibition. They appear as a 'Works Shown' grid on the exhibition page, linking to each painting's detail page."
      - { label: "External Link", name: "link", widget: "string", required: false, hint: "Optional press link, gallery page, catalogue PDF." }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 99, required: false }

  - name: "collectors"
    label: "Collectors Edit"
    folder: "content/collectors"
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Display title, e.g. 'Nocturnal Whispers — Collector's Home'" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe identifier, e.g. nocturnal-whispers-collector" }
      - { label: "Painting Title", name: "painting_title", widget: "string", hint: "Name of the painting as shown in the collector's space" }
      - { label: "Image", name: "image", widget: "image", media_folder: "/public/images/collectors", public_folder: "/images/collectors", hint: "Photo of the painting in the collector's home" }
      - { label: "Caption", name: "caption", widget: "string", required: false, hint: "Optional caption displayed below the image" }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 99, required: false }

  - name: "all-paintings-reference"
    label: "All Paintings (reference only)"
    description: "This collection exists only so 'Works Shown' relations on exhibitions can target any painting regardless of availability. Edit paintings through 'Available Paintings' or 'Past Works'."
    folder: "content/paintings"
    create: false
    identifier_field: slug
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Availability", name: "availability", widget: "string", required: false }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "home"
        file: "content/pages/home.md"
        fields:
          # ── Hero ─────────────────────────────────────────────────
          - { label: "Hero — Headline (line 1)", name: "hero_headline_line1", widget: "string", hint: "First line of the big headline (e.g. 'Explore the intersection')." }
          - { label: "Hero — Headline (line 2)", name: "hero_headline_line2", widget: "string", hint: "Second line of the big headline (e.g. 'of spirituality and abstraction')." }
          - { label: "Hero — Slideshow Label", name: "hero_slideshow_label", widget: "string", hint: "Small label on the slideshow caption (e.g. 'Featured Work')." }
          # ── Available Works ──────────────────────────────────────
          - { label: "Available Works — Title", name: "available_title", widget: "string" }
          - { label: "Available Works — Primary CTA", name: "available_cta", widget: "string", hint: "Primary button label (e.g. 'View available works')." }
          - { label: "Available Works — Secondary CTA", name: "available_secondary_cta", widget: "string", hint: "Secondary link label (e.g. 'Browse past works →')." }
          # ── About ────────────────────────────────────────────────
          - { label: "About — Big Title", name: "about_big_title", widget: "string" }
          - { label: "About — Section Label", name: "about_section_label", widget: "string", hint: "Small heading on the left column." }
          - { label: "About — CTA", name: "about_cta", widget: "string", hint: "Link label (e.g. 'Read Full Biography')." }
          # ── Past Works ───────────────────────────────────────────
          - { label: "Past Works — Title", name: "past_works_title", widget: "string" }
          - { label: "Past Works — Subhead", name: "past_works_subhead", widget: "string" }
          - { label: "Past Works — CTA", name: "past_works_cta", widget: "string" }
          # ── Collectors ───────────────────────────────────────────
          - { label: "Collectors — Title", name: "collectors_title", widget: "string", hint: "Section heading (e.g. 'Collectors Edit')." }
          - { label: "Collectors — Subhead", name: "collectors_subhead", widget: "string", hint: "Small subheading under the section heading." }
          - { label: "Collectors — CTA", name: "collectors_cta", widget: "string", hint: "Button label below the collectors carousel." }
          # ── Exhibitions ──────────────────────────────────────────
          - { label: "Exhibitions — Title", name: "exhibitions_title", widget: "string" }
          - { label: "Exhibitions — Subhead", name: "exhibitions_subhead", widget: "string" }
          - { label: "Exhibitions — CTA", name: "exhibitions_cta", widget: "string" }
          # ── Contact ──────────────────────────────────────────────
          - { label: "Contact — Headline", name: "contact_headline", widget: "string" }
          - { label: "Contact — Body", name: "contact_body", widget: "text" }
          - { label: "Contact — CTA", name: "contact_cta", widget: "string" }
          # ── Artist Block (hero) ──────────────────────────────────
          - { label: "Hero — Portrait Image", name: "portrait_image", widget: "image", required: false, media_folder: "/public/images/about", public_folder: "/images/about" }
          - { label: "Hero — Artist Name", name: "bio_intro", widget: "string", required: false }
          - { label: "Hero — Paragraphs", name: "hero_subhead", widget: "text", required: false, hint: "Hero paragraphs under the big headline. Separate paragraphs with a blank line." }

      - label: "Available Works (page)"
        name: "available"
        file: "content/pages/available.md"
        fields:
          # ── Hero ─────────────────────────────────────────────────
          - { label: "Hero — Eyebrow", name: "hero_eyebrow", widget: "string", hint: "Small label above the big heading." }
          - { label: "Hero — Title", name: "hero_title", widget: "string", hint: "Big page heading." }
          - { label: "Hero — Description", name: "hero_description", widget: "text", hint: "Intro paragraph under the heading." }
          # ── Tiles ────────────────────────────────────────────────
          - { label: "Tile — Hover Label", name: "tile_hover_label", widget: "string", hint: "Label shown when hovering a painting tile (e.g. 'View this piece')." }
          - { label: "Tile — View Link Label", name: "tile_view_label", widget: "string", hint: "Label on the small underlined link under each tile (e.g. 'View')." }
          # ── Empty state ──────────────────────────────────────────
          - { label: "Empty State Message", name: "empty_state", widget: "text", hint: "Message shown when no paintings are currently available." }
          # ── SEO ──────────────────────────────────────────────────
          - { label: "SEO — Browser Tab Title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO — Meta Description", name: "seo_description", widget: "text", required: false }

      - label: "Exhibition Detail — Shared Labels"
        name: "exhibition-detail-chrome"
        file: "content/pages/exhibition-detail-chrome.md"
        fields:
          - { label: "Back Link Label", name: "back_link_label", widget: "string", hint: "Back link to /exhibitions (e.g. '← The Archive')." }
          - { label: "Works Shown — Eyebrow", name: "works_shown_eyebrow", widget: "string", hint: "Small label above the Works Shown grid (e.g. 'Works')." }
          - { label: "Works Shown — Title", name: "works_shown_title", widget: "string", hint: "Section heading for the Works Shown grid." }
          - { label: "Read More — CTA", name: "read_more_label", widget: "string", hint: "External link CTA (e.g. 'Read more →')." }
          - { label: "Not Found — Title", name: "not_found_title", widget: "string", hint: "Heading shown when an exhibition URL is invalid." }

      - label: "Painting Detail — Shared Labels"
        name: "painting-detail-chrome"
        file: "content/pages/painting-detail-chrome.md"
        fields:
          # ── Back Link ────────────────────────────────────────────
          - { label: "Back Link — Available", name: "back_to_available", widget: "string", hint: "Back link shown on Available pieces (e.g. '← Available Works')." }
          - { label: "Back Link — Past", name: "back_to_past", widget: "string", hint: "Back link shown on Sold pieces (e.g. '← Past Works')." }
          # ── Spec Labels ──────────────────────────────────────────
          - { label: "Spec Label — Medium", name: "spec_label_medium", widget: "string" }
          - { label: "Spec Label — Dimensions", name: "spec_label_dimensions", widget: "string" }
          - { label: "Spec Label — Year", name: "spec_label_year", widget: "string" }
          - { label: "Spec Label — Availability", name: "spec_label_availability", widget: "string" }
          - { label: "Availability — Available text", name: "availability_available", widget: "string", hint: "Value shown when painting is available." }
          - { label: "Availability — Sold text", name: "availability_sold", widget: "string", hint: "Value shown when painting is sold." }
          # ── Artist's Note ────────────────────────────────────────
          - { label: "Artist's Note — Section Title", name: "artist_note_title", widget: "string" }
          # ── Inquire Section ──────────────────────────────────────
          - { label: "Inquire — Title (Available)", name: "inquire_title_available", widget: "string", hint: "Heading shown for available pieces." }
          - { label: "Inquire — Title (Sold)", name: "inquire_title_sold", widget: "string", hint: "Heading shown for sold pieces." }
          - { label: "Inquire — Sold note", name: "inquire_sold_note", widget: "text", hint: "Extra paragraph shown only on sold pieces." }
          # ── Form ─────────────────────────────────────────────────
          - { label: "Form — Name label", name: "form_label_name", widget: "string" }
          - { label: "Form — Phone label", name: "form_label_phone", widget: "string" }
          - { label: "Form — Email label", name: "form_label_email", widget: "string" }
          - { label: "Form — Submit button", name: "form_submit", widget: "string" }
          - { label: "Form — Submitting button", name: "form_submitting", widget: "string", hint: "Button label while the form is sending." }
          - { label: "Form — Success title", name: "form_success_title", widget: "string", hint: "Heading shown after a successful inquiry." }
          - { label: "Form — Success body", name: "form_success_body", widget: "text" }
          - { label: "Form — Error message", name: "form_error", widget: "string" }
          # ── Related Works ────────────────────────────────────────
          - { label: "Related Works — Title", name: "related_title", widget: "string" }
          - { label: "Related Works — Tile hover", name: "related_tile_hover", widget: "string" }
          - { label: "Related Works — Tile View link", name: "related_tile_view", widget: "string" }
          # ── States ───────────────────────────────────────────────
          - { label: "Not Found — Title", name: "not_found_title", widget: "string" }
          - { label: "Not Found — CTA", name: "not_found_cta", widget: "string" }
          - { label: "Image Forthcoming Label", name: "image_forthcoming_label", widget: "string", hint: "Placeholder text shown when a painting has no image yet." }

      - label: "Exhibitions (page)"
        name: "exhibitions-page"
        file: "content/pages/exhibitions.md"
        fields:
          # ── Hero ─────────────────────────────────────────────────
          - { label: "Hero — Eyebrow", name: "hero_eyebrow", widget: "string", hint: "Small label above the title (e.g. 'Archive')." }
          - { label: "Hero — Title (prefix)", name: "hero_title_prefix", widget: "string", hint: "First part of the title — rendered upright (e.g. 'The ')." }
          - { label: "Hero — Title (italic)", name: "hero_title_italic", widget: "string", hint: "Italic emphasis part of the title (e.g. 'Archive')." }
          - { label: "Count — Singular word", name: "count_singular", widget: "string", hint: "Word shown after the count when exactly 1 (e.g. 'exhibition')." }
          - { label: "Count — Plural word", name: "count_plural", widget: "string", hint: "Word shown after the count when 0 or 2+ (e.g. 'exhibitions')." }
          # ── Archive Section ──────────────────────────────────────
          - { label: "Archive — Section Label", name: "archive_section_label", widget: "string", hint: "Small label above the archive intro paragraph." }
          - { label: "Archive — Intro paragraph", name: "archive_section_intro", widget: "text", hint: "Italic serif intro above the year-grouped exhibition grid." }
          # ── Card Labels ──────────────────────────────────────────
          - { label: "Card — View CTA", name: "view_exhibition_label", widget: "string", hint: "CTA on Hero and Next featured cards (e.g. 'View exhibition')." }
          - { label: "Card — Next badge", name: "next_badge_label", widget: "string", hint: "Badge text on the second featured card (e.g. 'Next')." }
          - { label: "Card — Type fallback", name: "exhibition_type_fallback", widget: "string", hint: "Fallback when an exhibition has no type (e.g. 'Exhibition')." }
          # ── Empty / SEO ──────────────────────────────────────────
          - { label: "Empty State Message", name: "empty_state", widget: "text" }
          - { label: "SEO — Browser Tab Title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO — Meta Description", name: "seo_description", widget: "text", required: false }

      - label: "Past Works (page)"
        name: "past-works-page"
        file: "content/pages/past-works.md"
        fields:
          # ── Hero ─────────────────────────────────────────────────
          - { label: "Hero — Eyebrow", name: "hero_eyebrow", widget: "string", hint: "Small label above the big heading." }
          - { label: "Hero — Title", name: "hero_title", widget: "string", hint: "Big page heading." }
          - { label: "Hero — Description", name: "hero_description", widget: "text", hint: "Intro paragraph under the heading." }
          # ── Tiles ────────────────────────────────────────────────
          - { label: "Tile — Status Badge", name: "tile_status_label", widget: "string", hint: "Badge label on each tile (e.g. 'In Private Collection')." }
          - { label: "Tile — Hover Label", name: "tile_hover_label", widget: "string", hint: "Label shown when hovering a painting tile (e.g. 'View work')." }
          - { label: "Tile — View Link Label", name: "tile_view_label", widget: "string", hint: "Label on the small underlined link under each tile (e.g. 'View')." }
          # ── Empty state ──────────────────────────────────────────
          - { label: "Empty State Message", name: "empty_state", widget: "text", hint: "Message shown when there are no past works yet." }
          # ── SEO ──────────────────────────────────────────────────
          - { label: "SEO — Browser Tab Title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO — Meta Description", name: "seo_description", widget: "text", required: false }

      - label: "About"
        name: "about"
        file: "content/pages/about.md"
        fields:
          # ── Hero ─────────────────────────────────────────────────
          - { label: "Hero — Eyebrow", name: "hero_eyebrow", widget: "string", hint: "Small label above the big heading (e.g. 'About')." }
          - { label: "Hero — Title", name: "hero_title", widget: "string", hint: "Big page heading (e.g. 'About the artist')." }
          - label: "Hero — Intro paragraph"
            name: "bio_intro"
            widget: "markdown"
            hint: "Short intro paragraph under the heading. Inline emphasis only — bold, italic, and links."
            buttons: ["bold", "italic", "link"]
            editor_components: []
            modes: ["rich_text", "raw"]
          - { label: "Hero — Portrait Image", name: "portrait_image", widget: "image", required: false, media_folder: "/public/images/about", public_folder: "/images/about" }
          # ── Biography ────────────────────────────────────────────
          - { label: "Biography — Section title", name: "biography_title", widget: "string", hint: "Section heading (e.g. 'Biography')." }
          - { label: "Biography — Subhead", name: "biography_subhead", widget: "string", hint: "Small heading in the left column (e.g. 'About the artist')." }
          - { label: "Biography — Body", name: "bio_body", widget: "markdown", hint: "Long-form biography. Use headings, paragraphs, lists, blockquotes — all rendered on the live page." }
          # ── Statement ────────────────────────────────────────────
          - { label: "Statement — Eyebrow", name: "statement_label", widget: "string", required: false, hint: "Eyebrow label (e.g. 'Artist statement')." }
          - label: "Statement — Artist Statement"
            name: "artist_statement"
            widget: "markdown"
            required: false
            hint: "Short, quotable statement. Inline emphasis only — bold, italic, links."
            buttons: ["bold", "italic", "link"]
            editor_components: []
            modes: ["rich_text", "raw"]
          - { label: "Statement — Studio Eyebrow", name: "studio_label", widget: "string", required: false, hint: "Eyebrow label (e.g. 'Studio note')." }
          - { label: "Statement — Studio Note", name: "studio_note", widget: "string", required: false }
          # ── Closing CTA ──────────────────────────────────────────
          - { label: "CTA — Eyebrow", name: "cta_eyebrow", widget: "string", hint: "Small label above the CTA heading (e.g. 'Continue')." }
          - { label: "CTA — Title", name: "cta_title", widget: "string", hint: "CTA heading (e.g. 'Explore further')." }
          - { label: "CTA — Body", name: "cta_body", widget: "text", hint: "CTA paragraph copy." }
          - { label: "CTA — Contact Button", name: "cta_contact_button", widget: "string", hint: "Primary button label (e.g. 'Get in touch')." }
          - { label: "CTA — Available Works Link", name: "cta_available_link", widget: "string" }
          - { label: "CTA — Exhibitions Link", name: "cta_exhibitions_link", widget: "string" }
          # ── SEO / Meta ───────────────────────────────────────────
          - { label: "SEO — Browser Tab Title", name: "title", widget: "string", required: false, hint: "Appears in the browser tab and as the SEO title." }

      - label: "Contact"
        name: "contact"
        file: "content/pages/contact.md"
        fields:
          - label: "Intro Text"
            name: "intro"
            widget: "markdown"
