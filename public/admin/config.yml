backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: "paintings"
    label: "Available Paintings"
    label_singular: "Available Painting"
    folder: "content/paintings"
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    filter:
      field: availability
      value: available
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe identifier, e.g. nocturnal-whispers" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Medium", name: "medium", widget: "string" }
      - { label: "Dimensions", name: "dimensions", widget: "string", required: false }
      - label: "Availability"
        name: "availability"
        widget: "select"
        hint: "Change to 'Sold' or 'Not for sale' to move this piece to Past Works."
        options:
          - { label: "Available", value: "available" }
          - { label: "Sold", value: "sold" }
          - { label: "Not for sale", value: "nfs" }
        default: "available"
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Thumbnail Image", name: "thumbnail_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Short Description", name: "short_description", widget: "text", required: false }
      - { label: "Full Description", name: "full_description", widget: "markdown", required: false }
      - { label: "Inquiry Subject Line", name: "inquiry_subject", widget: "string", required: false }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "string", required: false }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 99, required: false }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

  - name: "past-works"
    label: "Past Works"
    label_singular: "Past Work"
    folder: "content/paintings"
    create: false
    slug: "{{slug}}"
    identifier_field: slug
    filter:
      field: availability
      values: ["sold", "nfs"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe identifier, e.g. nocturnal-whispers" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Medium", name: "medium", widget: "string" }
      - { label: "Dimensions", name: "dimensions", widget: "string", required: false }
      - label: "Availability"
        name: "availability"
        widget: "select"
        hint: "Change to 'Available' to move this piece back to Available Paintings."
        options:
          - { label: "Available", value: "available" }
          - { label: "Sold", value: "sold" }
          - { label: "Not for sale", value: "nfs" }
        default: "sold"
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Thumbnail Image", name: "thumbnail_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Short Description", name: "short_description", widget: "text", required: false }
      - { label: "Full Description", name: "full_description", widget: "markdown", required: false }
      - { label: "Inquiry Subject Line", name: "inquiry_subject", widget: "string", required: false }
      - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
      - { label: "SEO Description", name: "seo_description", widget: "string", required: false }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 99, required: false }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }

  - name: "exhibitions"
    label: "Exhibitions"
    folder: "content/exhibitions"
    create: true
    slug: "{{year}}-{{slug}}"
    identifier_field: title
    fields:
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Start Date", name: "start_date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false, hint: "Optional. Leave blank to show year only." }
      - { label: "End Date", name: "end_date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false, hint: "Tick to highlight this exhibition at the top of /exhibitions. Up to two featured exhibitions show as Hero + NEXT; if fewer than two are flagged, the page auto-fills with the most recent exhibitions that have images." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "City", name: "city", widget: "string", required: false }
      - label: "Exhibition Type"
        name: "exhibition_type"
        widget: "select"
        options:
          - { label: "Solo", value: "Solo" }
          - { label: "Group", value: "Group" }
          - { label: "Residency", value: "Residency" }
          - { label: "Art Fair", value: "Art Fair" }
      - { label: "Hero Image", name: "hero_image", widget: "image", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions", hint: "Full-bleed image at the top of the detail page and the default image for featured slots on the listing." }
      - { label: "Card Thumbnail", name: "card_thumbnail", widget: "image", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions", hint: "Optional. Image used on the archive grid card. Falls back to Hero Image, then the first Gallery image if blank." }
      - { label: "Hero Video", name: "hero_video", widget: "file", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions", hint: "Optional. Upload an MP4 or paste a YouTube / Vimeo / Cloudinary URL. Replaces the Hero Image when set." }
      - { label: "Short Description", name: "description", widget: "text", required: false, hint: "Plain text. Shown as a teaser on the listing row." }
      - { label: "Body", name: "body", widget: "markdown", required: false, hint: "Long-form editorial content. Inline images use ![alt](url). Inline videos use the same syntax — paste any MP4, YouTube, Vimeo, or Cloudinary URL and it renders as a video." }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        summary: "{{fields.caption}}"
        fields:
          - { label: "Image", name: "image", widget: "image", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions" }
          - { label: "Video", name: "video", widget: "file", required: false, media_folder: "/public/images/exhibitions", public_folder: "/images/exhibitions", hint: "Upload MP4 or paste YouTube / Vimeo / Cloudinary URL. Replaces Image when set." }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - label: "Works Shown"
        name: "works_shown"
        widget: "relation"
        collection: "all-paintings-reference"
        search_fields: ["title", "year"]
        value_field: "slug"
        display_fields: ["title", "year"]
        multiple: true
        required: false
        hint: "Pick paintings shown at this exhibition. They appear as a 'Works Shown' grid on the exhibition page, linking to each painting's detail page."
      - { label: "External Link", name: "link", widget: "string", required: false, hint: "Optional press link, gallery page, catalogue PDF." }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 99, required: false }

  - name: "collectors"
    label: "Collectors Edit"
    folder: "content/collectors"
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Display title, e.g. 'Nocturnal Whispers — Collector's Home'" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe identifier, e.g. nocturnal-whispers-collector" }
      - { label: "Painting Title", name: "painting_title", widget: "string", hint: "Name of the painting as shown in the collector's space" }
      - { label: "Image", name: "image", widget: "image", media_folder: "/public/images/collectors", public_folder: "/images/collectors", hint: "Photo of the painting in the collector's home" }
      - { label: "Caption", name: "caption", widget: "string", required: false, hint: "Optional caption displayed below the image" }
      - { label: "Sort Order", name: "sort_order", widget: "number", default: 99, required: false }

  - name: "all-paintings-reference"
    label: "All Paintings (reference only)"
    description: "This collection exists only so 'Works Shown' relations on exhibitions can target any painting regardless of availability. Edit paintings through 'Available Paintings' or 'Past Works'."
    folder: "content/paintings"
    create: false
    identifier_field: slug
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Year", name: "year", widget: "string", required: false }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false, media_folder: "/public/images/paintings", public_folder: "/images/paintings" }
      - { label: "Availability", name: "availability", widget: "string", required: false }

  - name: "pages"
    label: "Pages"
    files:
      - label: "About"
        name: "about"
        file: "content/pages/about.md"
        fields:
          - { label: "Portrait Image", name: "portrait_image", widget: "image", required: false, media_folder: "/public/images/about", public_folder: "/images/about" }
          - { label: "Bio Intro", name: "bio_intro", widget: "text" }
          - { label: "Bio Body", name: "bio_body", widget: "markdown" }
          - { label: "Artist Statement", name: "artist_statement", widget: "text", required: false }
          - { label: "Studio Note", name: "studio_note", widget: "string", required: false }

      - label: "Contact"
        name: "contact"
        file: "content/pages/contact.md"
        fields:
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram Handle", name: "instagram", widget: "string", required: false }
          - { label: "Response Note", name: "response_note", widget: "string", required: false }

      - label: "Collectors Edit Page"
        name: "collectors-edit"
        file: "content/pages/collectors-edit.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - { label: "SEO Title", name: "seo_title", widget: "string", required: false }
          - { label: "SEO Description", name: "seo_description", widget: "string", required: false }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "content/settings/site.json"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }
          - { label: "Default SEO Title", name: "seo_title", widget: "string" }
          - { label: "Default SEO Description", name: "seo_description", widget: "text" }
          - { label: "Inquiry Email", name: "inquiry_email", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Footer Text", name: "footer_text", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string", required: false }
