<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CMS — Sadaf</title>
  <style>
    /* Mobile optimization for Decap CMS admin (phones only — desktop unchanged).
       Decap v3 is desktop-first. These overrides make it usable on phones so
       Sadaf can manage entries + upload paintings directly from her iPhone. */
    @media (max-width: 768px) {
      /* Hide the editor preview pane — decorative on a phone, frees screen + memory */
      [class*="EditorPreviewPane"],
      [class*="PreviewPane"] {
        display: none !important;
      }

      /* Form pane fills the screen once preview is gone */
      [class*="EditorControlPane"],
      [class*="ControlPane"] {
        width: 100% !important;
        max-width: 100% !important;
        flex: 1 1 100% !important;
        padding: 12px !important;
      }

      /* Apple HIG: 44pt minimum touch target */
      button,
      [role="button"] {
        min-height: 44px !important;
        padding: 10px 14px !important;
      }

      /* Sticky bottom toolbar — Save / Publish often scroll off-screen otherwise */
      [class*="EditorToolBar"],
      [class*="EditorToolbar"] {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        z-index: 100 !important;
        background: #fff !important;
        border-top: 1px solid #e2e2e2 !important;
        padding: 8px !important;
        flex-wrap: wrap !important;
        gap: 6px !important;
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
      }

      /* Pad the form so its content isn't hidden behind the sticky toolbar */
      [class*="EditorContent"],
      [class*="EditorContainer"] {
        padding-bottom: 100px !important;
      }

      /* Media library: 2-col grid on phones instead of the desktop 4-6 col grid */
      [class*="MediaLibraryCardGrid"],
      [class*="CardsGrid"] {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 8px !important;
      }

      /* Full-screen modals (media library, dialogs) */
      [class*="ModalContent"],
      [class*="DialogContent"],
      [role="dialog"] > div {
        width: 100vw !important;
        height: 100vh !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        border-radius: 0 !important;
        margin: 0 !important;
      }

      /* Side nav becomes a slide-out overlay rather than always-on column */
      nav[class*="SideBar"],
      [class*="SidebarContainer"],
      [class*="CollectionSidebar"] {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        bottom: 0 !important;
        width: 80vw !important;
        max-width: 320px !important;
        z-index: 90 !important;
        background: #fff !important;
        box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
      }

      /* Form fields: bigger labels, prevent iOS zoom on input focus (16px+) */
      label,
      [class*="FieldLabel"] {
        font-size: 14px !important;
        font-weight: 600 !important;
      }

      input[type="text"],
      input[type="email"],
      input[type="url"],
      input[type="number"],
      input[type="search"],
      textarea,
      select {
        font-size: 16px !important;
        padding: 10px !important;
      }

      /* Image upload widget touch target */
      [class*="ImageWidget"],
      [class*="FileWidget"] {
        padding: 16px !important;
      }

      /* Markdown toolbar: wrap rather than overflow horizontally */
      [class*="MarkdownToolbar"],
      [class*="ToolbarContainer"] {
        flex-wrap: wrap !important;
      }

      /* Card grid on collection pages: single column for readable rows */
      [class*="EntryListing"] [class*="Card"],
      [class*="CollectionCard"] {
        width: 100% !important;
      }
    }
  </style>
  <script>
    /* Client-side image auto-resize for the Decap CMS image upload widget.
       Why: older Macs (e.g. 2017 i5 MBP / 8 GB RAM) run out of memory when
       Decap's FileReader base64-encodes multi-MB iPhone JPEGs, causing the
       file picker to silently fail. This script intercepts the file BEFORE
       Decap sees it, downsizes it via canvas, and substitutes the smaller
       File. Originals over 1.5 MB get resized to max 2000px / ~quality 0.82.
       Falls back to original on any error — never a regression. */
    (function () {
      var MAX_SIZE_BYTES = 1.5 * 1024 * 1024;
      var TARGET_MAX_DIM = 2000;
      var JPEG_QUALITY = 0.82;

      function resizeImageFile(file) {
        return new Promise(function (resolve) {
          if (!/^image\/(jpe?g|png|webp)$/i.test(file.type)) {
            resolve(file);
            return;
          }
          if (file.size <= MAX_SIZE_BYTES) {
            resolve(file);
            return;
          }
          var reader = new FileReader();
          reader.onload = function (e) {
            var img = new Image();
            img.onload = function () {
              var longEdge = Math.max(img.width, img.height);
              if (longEdge <= TARGET_MAX_DIM) {
                resolve(file);
                return;
              }
              var scale = TARGET_MAX_DIM / longEdge;
              var w = Math.round(img.width * scale);
              var h = Math.round(img.height * scale);
              var canvas = document.createElement('canvas');
              canvas.width = w;
              canvas.height = h;
              var ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, w, h);
              canvas.toBlob(function (blob) {
                if (!blob) { resolve(file); return; }
                var nameNoExt = file.name.replace(/\.[^.]+$/, '');
                var newFile = new File([blob], nameNoExt + '.jpg', {
                  type: 'image/jpeg',
                  lastModified: file.lastModified || Date.now(),
                });
                console.log('[Decap auto-resize] ' + file.name + ': ' +
                  (file.size / 1024 / 1024).toFixed(2) + ' MB → ' +
                  (newFile.size / 1024 / 1024).toFixed(2) + ' MB');
                resolve(newFile);
              }, 'image/jpeg', JPEG_QUALITY);
            };
            img.onerror = function () { resolve(file); };
            img.src = e.target.result;
          };
          reader.onerror = function () { resolve(file); };
          reader.readAsDataURL(file);
        });
      }

      /* Intercept file selection at document level (capture phase) so we run
         BEFORE Decap's React handler. After resize, dispatch a new change
         event with a flag so we don't loop. */
      document.addEventListener('change', function (event) {
        var input = event.target;
        if (!(input instanceof HTMLInputElement) || input.type !== 'file') return;
        if (!input.files || input.files.length === 0) return;
        if (input.dataset.autoResized === '1') {
          delete input.dataset.autoResized;
          return;
        }
        event.stopImmediatePropagation();
        var originals = Array.from(input.files);
        Promise.all(originals.map(resizeImageFile)).then(function (resized) {
          try {
            var dt = new DataTransfer();
            resized.forEach(function (f) { dt.items.add(f); });
            input.files = dt.files;
            input.dataset.autoResized = '1';
            input.dispatchEvent(new Event('change', { bubbles: true }));
          } catch (err) {
            console.warn('[Decap auto-resize] swap failed, falling back', err);
          }
        }).catch(function (err) {
          console.warn('[Decap auto-resize] error, falling back', err);
        });
      }, true);
    })();
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // WYSIWYG: feed the live site's editorial styles into Decap's preview iframe,
    // and render every collection's preview with the same DOM structure as the
    // live page so editors see what visitors will see.
    CMS.registerPreviewStyle('/styles/editorial.css');
    CMS.registerPreviewStyle('/admin/preview.css');

    var h = window.h;
    var createClass = window.createClass;

    function resolveAsset(getAsset, value) {
      if (!value) return null;
      var str = typeof value === 'string' ? value : value.toString();
      if (/^https?:\/\//i.test(str)) return str;
      try { return getAsset(str).toString(); } catch (e) { return str; }
    }

    function isVideoUrl(url) {
      if (!url) return false;
      return /\.(mp4|webm|mov|m4v)(\?|$)/i.test(url) || /cloudinary\.com\/.+\/video\//i.test(url);
    }

    function availabilityLabel(value) {
      if (value === 'available') return 'Available';
      if (value === 'sold') return 'Sold';
      if (value === 'nfs') return 'Not for sale';
      return value || '';
    }

    /* Bridge for cross-collection painting data. The Decap preview iframe is
       sandboxed — it can't query the paintings collection directly. A Vite
       plugin (vite-plugins/decap-paintings-manifest.js) emits this JSON at
       dev start and build, refreshed whenever content/paintings/ changes. */
    var _paintingsManifestPromise = null;
    function loadPaintingsManifest() {
      if (!_paintingsManifestPromise) {
        _paintingsManifestPromise = fetch('/admin/paintings-manifest.json', { cache: 'no-store' })
          .then(function (r) { return r.ok ? r.json() : []; })
          .catch(function () { return []; });
      }
      return _paintingsManifestPromise;
    }

    function realPaintingTile(p, opts) {
      opts = opts || {};
      var img = p.thumbnail_image || p.featured_image;
      var children = [];
      if (img) children.push(h('img', { key: 'i', src: img, alt: p.title || '' }));
      else children.push(h('span', { key: 'h', className: 'home-preview-tile-hint' }, 'No image'));
      if (opts.statusLabel) {
        children.push(h('span', { key: 's', className: 'listing-preview-tile-status' }, opts.statusLabel));
      }
      return h(
        'div',
        { key: p.slug, className: opts.tileClass || 'listing-preview-tile' },
        children
      );
    }

    /* ---------------- Exhibition preview ---------------- */
    // Includes gallery thumbnails + Works Shown grid (real painting tiles
    // looked up via the paintings manifest bridge).
    var ExhibitionPreview = createClass({
      getInitialState: function () { return { paintings: null }; },
      componentDidMount: function () {
        var self = this;
        loadPaintingsManifest().then(function (p) { self.setState({ paintings: p }); });
      },
      render: function () {
        var entry = this.props.entry;
        var data = entry.get('data');
        var widgetFor = this.props.widgetFor;
        var getAsset = this.props.getAsset;

        var title = data.get('title') || '';
        var venue = data.get('venue') || '';
        var city = data.get('city') || '';
        var year = data.get('year') || '';
        var exhibitionType = data.get('exhibition_type') || '';
        var heroImage = resolveAsset(getAsset, data.get('hero_image'));
        var heroVideo = resolveAsset(getAsset, data.get('hero_video'));
        var gallery = data.get('gallery');
        var worksShown = data.get('works_shown');

        var metaBits = [];
        if (exhibitionType) metaBits.push(exhibitionType + ' Exhibition');
        if (year) metaBits.push(year);
        var metaPrefix = metaBits.join(' · ');
        var venueLine = venue + (city ? ', ' + city : '');

        // ── Hero ──
        var heroNode = null;
        if (heroVideo && isVideoUrl(heroVideo)) {
          heroNode = h('video', {
            className: 'preview-hero preview-hero-video',
            src: heroVideo,
            controls: true,
            preload: 'metadata',
            playsInline: true,
          });
        } else if (heroVideo) {
          heroNode = h('iframe', {
            className: 'preview-hero',
            src: heroVideo,
            allow: 'autoplay; fullscreen; picture-in-picture',
            allowFullScreen: true,
            style: { aspectRatio: '16/9', border: 0 },
          });
        } else if (heroImage) {
          heroNode = h('img', { className: 'preview-hero', src: heroImage, alt: title });
        }

        // ── Gallery section ──
        var gallerySection = null;
        if (gallery && gallery.size > 0) {
          var galleryItems = [];
          gallery.forEach(function (g, i) {
            if (!g) return;
            var imgPath = g.get && g.get('image');
            var vidPath = g.get && g.get('video');
            var caption = (g.get && g.get('caption')) || '';
            var src = resolveAsset(getAsset, vidPath || imgPath);
            if (!src) return;
            var media;
            if (vidPath && isVideoUrl(src)) {
              media = h('video', { src: src, controls: true, preload: 'metadata', playsInline: true });
            } else if (vidPath) {
              media = h('iframe', { src: src, allow: 'autoplay; fullscreen', style: { aspectRatio: '16/9', border: 0, width: '100%' } });
            } else {
              media = h('img', { src: src, alt: caption });
            }
            galleryItems.push(
              h('figure', { key: 'g' + i, className: 'exhibition-preview-gallery-item' },
                media,
                caption ? h('figcaption', null, caption) : null
              )
            );
          });
          if (galleryItems.length > 0) {
            gallerySection = h('section', { className: 'exhibition-preview-gallery' },
              h('div', { className: 'preview-section-header' }, h('h2', null, 'Gallery')),
              h('div', { className: 'exhibition-preview-gallery-stack' }, galleryItems)
            );
          }
        }

        // ── Works Shown grid (uses paintings manifest) ──
        var worksSection = null;
        if (worksShown && worksShown.size > 0) {
          var paintings = this.state.paintings;
          var worksList = worksShown.toJS ? worksShown.toJS() : worksShown;
          var worksTiles = [];
          if (paintings) {
            worksList.forEach(function (slug, i) {
              var p = paintings.find(function (item) { return item.slug === slug; });
              if (!p) {
                worksTiles.push(
                  h('div', { key: 'w' + i, className: 'listing-preview-tile' },
                    h('span', { className: 'home-preview-tile-hint' }, slug + ' (not found)')
                  )
                );
                return;
              }
              worksTiles.push(realPaintingTile(p, { tileClass: 'listing-preview-tile' }));
            });
          } else {
            // Manifest still loading — placeholder tiles
            for (var i = 0; i < worksList.length; i++) {
              worksTiles.push(
                h('div', { key: 'wp' + i, className: 'listing-preview-tile' },
                  h('span', { className: 'home-preview-tile-hint' }, 'Loading…')
                )
              );
            }
          }
          worksSection = h('section', { className: 'exhibition-preview-works' },
            h('div', { className: 'preview-section-header' }, h('h2', null, 'Works Shown')),
            h('div', { className: 'exhibition-preview-works-grid' }, worksTiles)
          );
        }

        return h('div', { className: 'exhibition-preview' },
          heroNode,
          h('header', { className: 'preview-header' },
            metaPrefix ? h('p', { className: 'preview-eyebrow' }, metaPrefix) : null,
            h('h1', { className: 'preview-title' }, title),
            venueLine ? h('p', { className: 'preview-venue' }, venueLine) : null
          ),
          h('article', { className: 'prose-editorial' }, widgetFor('body')),
          gallerySection,
          worksSection
        );
      },
    });

    CMS.registerPreviewTemplate('exhibitions', ExhibitionPreview);

    /* ---------------- Painting preview ---------------- */
    var PaintingPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var data = entry.get('data');
        var widgetFor = this.props.widgetFor;
        var getAsset = this.props.getAsset;

        var title = data.get('title') || '';
        var year = data.get('year') || '';
        var medium = data.get('medium') || '';
        var dimensions = data.get('dimensions') || '';
        var availability = availabilityLabel(data.get('availability'));
        var image = resolveAsset(getAsset, data.get('featured_image') || data.get('thumbnail_image'));
        var shortDescription = data.get('short_description') || '';
        var hasFullDescription = !!(data.get('full_description') && data.get('full_description').length);

        var specRows = [];
        if (medium) specRows.push(h('dt', { key: 'mlabel' }, 'Medium'), h('dd', { key: 'm' }, medium));
        if (dimensions) specRows.push(h('dt', { key: 'dlabel' }, 'Dimensions'), h('dd', { key: 'd' }, dimensions));
        if (year) specRows.push(h('dt', { key: 'ylabel' }, 'Year'), h('dd', { key: 'y' }, year));
        if (availability) specRows.push(h('dt', { key: 'alabel' }, 'Availability'), h('dd', { key: 'a' }, availability));

        return h('div', { className: 'painting-preview' },
          h('div', { className: 'painting-preview-grid' },
            h('div', { className: 'painting-preview-image' },
              image ? h('img', { src: image, alt: title }) : null
            ),
            h('div', { className: 'painting-preview-meta' },
              h('h1', { className: 'painting-preview-title' }, title),
              year ? h('p', { className: 'painting-preview-year' }, year) : null,
              specRows.length ? h('dl', { className: 'painting-preview-specs' }, specRows) : null,
              shortDescription ? h('p', { className: 'painting-preview-short' }, shortDescription) : null
            )
          ),
          hasFullDescription
            ? h('section', { className: 'painting-preview-note' },
                h('h2', null, "Artist's Note"),
                h('article', { className: 'prose-editorial' }, widgetFor('full_description'))
              )
            : null
        );
      },
    });

    CMS.registerPreviewTemplate('paintings', PaintingPreview);
    CMS.registerPreviewTemplate('past-works', PaintingPreview);

    /* ---------------- About page preview ---------------- */
    var AboutPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var data = entry.get('data');
        var widgetFor = this.props.widgetFor;
        var getAsset = this.props.getAsset;
        var g = function (k) { return data.get(k) || ''; };

        var portrait = resolveAsset(getAsset, data.get('portrait_image'));
        var hasIntro = !!(data.get('bio_intro') && data.get('bio_intro').length);
        var hasBody = !!(data.get('bio_body') && data.get('bio_body').length);
        var hasStatement = !!(data.get('artist_statement') && data.get('artist_statement').length);
        var studioNote = g('studio_note');

        return h('div', { className: 'about-preview' },
          h('section', { className: 'about-preview-hero' },
            h('div', null,
              h('span', { className: 'preview-eyebrow' }, g('hero_eyebrow') || 'About'),
              h('h1', { className: 'preview-title' }, g('hero_title') || 'About the artist'),
              hasIntro
                ? h('div', { className: 'about-preview-intro' }, widgetFor('bio_intro'))
                : null
            ),
            portrait ? h('img', { className: 'about-preview-portrait', src: portrait, alt: 'Portrait' }) : null
          ),
          hasBody
            ? h('section', { className: 'about-preview-bio' },
                h('div', { className: 'preview-section-header' }, h('h2', null, g('biography_title') || 'Biography')),
                h('h3', { className: 'about-preview-bio-subhead' }, g('biography_subhead') || 'About the artist'),
                h('article', { className: 'prose-editorial' }, widgetFor('bio_body'))
              )
            : null,
          hasStatement
            ? h('section', { className: 'about-preview-statement' },
                h('span', { className: 'preview-eyebrow-light' }, g('statement_label') || 'Artist statement'),
                h('blockquote', { className: 'about-preview-blockquote prose-editorial' },
                  '“', widgetFor('artist_statement'), '”'
                )
              )
            : null,
          studioNote
            ? h('section', { className: 'about-preview-studio-note' },
                h('span', { className: 'preview-eyebrow-light' }, g('studio_label') || 'Studio note'),
                h('p', null, studioNote)
              )
            : null,

          /* ── Closing CTA ──────────────────────────────── */
          h('section', { className: 'about-preview-cta' },
            h('span', { className: 'preview-eyebrow' }, g('cta_eyebrow') || 'Continue'),
            h('h2', { className: 'about-preview-cta-title' }, g('cta_title') || 'Explore further'),
            h('p', { className: 'about-preview-cta-body' },
              g('cta_body') || 'Discover the wider body of work, browse the exhibition archive, or get in touch directly.'),
            h('div', { className: 'about-preview-cta-buttons' },
              h('span', { className: 'about-preview-cta-primary' }, g('cta_contact_button') || 'Get in touch'),
              h('div', { className: 'about-preview-cta-links' },
                h('span', { className: 'about-preview-cta-link' }, g('cta_available_link') || 'View available works'),
                h('span', { className: 'about-preview-cta-link' }, g('cta_exhibitions_link') || 'View exhibitions')
              )
            )
          )
        );
      },
    });

    CMS.registerPreviewTemplate('about', AboutPreview);

    /* ---------------- Collectors Edit (page) preview ---------------- */
    var CollectorsEditPagePreview = createClass({
      render: function () {
        var data = this.props.entry.get('data');
        var widgetFor = this.props.widgetFor;
        var g = function (k) { return data.get(k) || ''; };

        var heroEyebrow = g('hero_eyebrow');
        var heroTitle = g('hero_title') || g('title') || 'The Collectors Edit';
        var hasIntro = !!(data.get('intro') && data.get('intro').length);

        // Masonry-style placeholder grid (mixed heights) so editors see
        // roughly where collector cards land.
        var tileHeights = ['short', 'tall', 'medium', 'tall', 'short', 'medium'];
        var tiles = [];
        for (var i = 0; i < tileHeights.length; i++) {
          tiles.push(
            h('div', { key: 't' + i, className: 'collectors-edit-preview-tile collectors-edit-preview-tile-' + tileHeights[i] },
              h('span', { className: 'home-preview-tile-hint' }, 'Collector image')
            )
          );
        }

        return h('div', { className: 'collectors-edit-preview' },
          // Hero
          h('section', { className: 'collectors-edit-preview-hero' },
            heroEyebrow ? h('p', { className: 'preview-eyebrow' }, heroEyebrow) : null,
            h('h1', { className: 'preview-title' }, heroTitle),
            h('div', { className: 'collectors-edit-preview-rule' }),
            hasIntro
              ? h('div', { className: 'collectors-edit-preview-intro prose-editorial' }, widgetFor('intro'))
              : null
          ),

          // Masonry placeholder grid + hover-label inspector
          h('section', { className: 'collectors-edit-preview-grid-section' },
            h('div', { className: 'collectors-edit-preview-grid' }, tiles),
            h('div', { className: 'collectors-edit-preview-helper' },
              h('span', { className: 'preview-eyebrow-light' }, 'Tile hover label'),
              h('p', { className: 'listing-preview-label-value' }, g('tile_hover_label') || 'View')
            )
          ),

          // Empty state preview
          h('section', { className: 'collectors-edit-preview-empty-section' },
            h('span', { className: 'preview-eyebrow-light' }, 'Empty state (shown when no collector pieces exist)'),
            h('p', { className: 'listing-preview-empty' }, g('empty_state') || 'Collector pieces will be added soon.')
          ),

          // Back button
          h('section', { className: 'collectors-edit-preview-back' },
            h('span', { className: 'home-preview-cta-outline' }, g('back_button_label') || 'Back to Home')
          )
        );
      },
    });

    CMS.registerPreviewTemplate('collectors-edit', CollectorsEditPagePreview);

    /* ---------------- Single collector card preview ---------------- */
    var CollectorPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var data = entry.get('data');
        var getAsset = this.props.getAsset;

        var image = resolveAsset(getAsset, data.get('image'));
        var paintingTitle = data.get('painting_title') || '';
        var caption = data.get('caption') || '';
        var title = data.get('title') || '';

        return h('div', { className: 'collector-preview' },
          h('figure', { className: 'collector-preview-figure' },
            image ? h('img', { src: image, alt: title }) : null,
            h('figcaption', null,
              paintingTitle ? h('p', { className: 'collector-preview-painting-title' }, paintingTitle) : null,
              caption ? h('p', { className: 'collector-preview-caption' }, caption) : null
            )
          )
        );
      },
    });

    CMS.registerPreviewTemplate('collectors', CollectorPreview);

    /* ---------------- Helpers shared by the homepage previews ---------------- */
    function blank(value, fallback) {
      var s = (value || '').toString().trim();
      if (s) return s;
      return h('span', { className: 'home-preview-empty' }, fallback || '—');
    }

    function splitParagraphs(value) {
      var s = (value || '').toString();
      return s.split(/\n\s*\n/).map(function (p) { return p.trim(); }).filter(Boolean);
    }

    /* ---------------- Homepage preview ---------------- */
    var HomePagePreview = createClass({
      getInitialState: function () { return { paintings: null }; },
      componentDidMount: function () {
        var self = this;
        loadPaintingsManifest().then(function (p) { self.setState({ paintings: p }); });
      },
      render: function () {
        var data = this.props.entry.get('data');

    function paintingListingPreview(options) {
      // options: { defaultEyebrow, defaultTitle, defaultDescription, defaultHover, defaultView, defaultEmpty, paintingFilter, statusFieldKey, defaultStatus }
      return createClass({
        getInitialState: function () { return { paintings: null }; },
        componentDidMount: function () {
          var self = this;
          loadPaintingsManifest().then(function (p) { self.setState({ paintings: p }); });
        },
        render: function () {
          var data = this.props.entry.get('data');
          var g = function (k) { return data.get(k) || ''; };
          var paintings = this.state.paintings;

          var statusLabel = options.statusFieldKey
            ? (g(options.statusFieldKey) || options.defaultStatus || '')
            : '';

          // Real tiles from manifest filtered by options.paintingFilter; fall
          // back to gray placeholder tiles while the manifest is still loading.
          var tiles;
          if (paintings) {
            var filtered = options.paintingFilter ? paintings.filter(options.paintingFilter) : paintings;
            tiles = filtered.slice(0, 6).map(function (p) {
              return realPaintingTile(p, { statusLabel: statusLabel });
            });
          } else {
            tiles = [];
            for (var i = 0; i < 6; i++) {
              var tileChildren = [
                h('span', { key: 'h', className: 'home-preview-tile-hint' }, 'Painting')
              ];
              if (statusLabel) {
                tileChildren.push(
                  h('span', { key: 's', className: 'listing-preview-tile-status' }, statusLabel)
                );
              }
              tiles.push(h('div', { key: 'tile-' + i, className: 'listing-preview-tile' }, tileChildren));
            }
          }

          return h('div', { className: 'listing-preview' },
            // Hero
            h('section', { className: 'listing-preview-hero' },
              h('span', { className: 'preview-eyebrow' }, g('hero_eyebrow') || options.defaultEyebrow),

            )
          ),

          // Related section
          h('section', { className: 'painting-chrome-section' },
            h('div', { className: 'preview-section-header' },
              h('h2', null, g('related_title') || 'You may also like')
            ),
            h('div', { className: 'painting-chrome-related-grid' },
              related.length
                ? related.map(function (p) { return realPaintingTile(p); })
                : [0, 1, 2].map(function (i) {
                    return h('div', { key: 'rel-' + i, className: 'listing-preview-tile' },
                      h('span', { className: 'home-preview-tile-hint' }, g('related_tile_hover') || 'View this piece')
                    );
                  })
            ),
            h('p', { className: 'painting-chrome-helper' },
              'Under each tile: ', h('strong', null, g('related_tile_view') || 'View')
            )
          ),

          // Not-found state
          h('section', { className: 'painting-chrome-section painting-chrome-section-light' },
            h('span', { className: 'preview-eyebrow-light' }, 'Not-found page (when a painting URL is invalid)'),
            h('h2', { className: 'painting-chrome-notfound-title' }, g('not_found_title') || 'Work not found.'),
            h('p', { className: 'painting-chrome-helper' },
              h('strong', null, g('not_found_cta') || '← Browse Available Works')
            )
          )
        );
      },
    });

    CMS.registerPreviewTemplate('painting-detail-chrome', PaintingDetailChromePreview);

    /* ---------------- Contact page preview ---------------- */
    // Mirrors src/pages/Contact.jsx: left column with intro + email + Instagram
    // + response_note, right column with a static form mockup.
    function instagramHandle(value) {
      if (!value) return '';
      var match = value.match(/instagram\.com\/([^/?#]+)/i);
      if (match) return '@' + match[1];
      if (value.charAt(0) === '@') return value;
      return '@' + value;
    }
    function instagramUrl(value) {
      if (!value) return '';
      if (/^https?:\/\//i.test(value)) return value;
      var handle = value.charAt(0) === '@' ? value.slice(1) : value;
      return 'https://instagram.com/' + handle;
    }

    var ContactPreview = createClass({
      render: function () {
        var data = this.props.entry.get('data');
        var widgetFor = this.props.widgetFor;
        var email = data.get('email') || '';
        var instagram = data.get('instagram') || '';
        var responseNote = data.get('response_note') || '';
        var hasIntro = !!(data.get('intro') && data.get('intro').length);

        return h('div', { className: 'contact-preview' },
          h('div', { className: 'contact-preview-grid' },
            h('div', { className: 'contact-preview-left' },
              h('span', { className: 'preview-eyebrow' }, 'Reach Out'),
              h('h1', { className: 'preview-title-italic' }, 'Get in Touch'),
              hasIntro
                ? h('div', { className: 'contact-preview-intro' }, widgetFor('intro'))
                : h('p', { className: 'contact-preview-intro contact-preview-placeholder' }, 'Intro paragraph goes here.'),
              h('dl', { className: 'contact-preview-meta' },
                h('dt', { key: 'e-l' }, 'Email'),
                h('dd', { key: 'e-v' }, email
                  ? h('a', { href: 'mailto:' + email }, email)
                  : h('span', { className: 'contact-preview-placeholder' }, 'inquiry@example.com')),
                instagram
                  ? [
                      h('dt', { key: 'i-l' }, 'Instagram'),
                      h('dd', { key: 'i-v' }, h('a', { href: instagramUrl(instagram), target: '_blank', rel: 'noreferrer' }, instagramHandle(instagram)))
                    ]
                  : null
              ),
              responseNote ? h('p', { className: 'contact-preview-response-note' }, responseNote) : null
            ),
            h('div', { className: 'contact-preview-right' },
              h('div', { className: 'painting-chrome-form' },
                h('div', { className: 'painting-chrome-field' },
                  h('label', null, 'Name'),
                  h('div', { className: 'painting-chrome-input' })
                ),
                h('div', { className: 'painting-chrome-field' },
                  h('label', null, 'Email'),
                  h('div', { className: 'painting-chrome-input' })
                ),
                h('div', { className: 'painting-chrome-field' },
                  h('label', null, 'Reason'),
                  h('div', { className: 'painting-chrome-input' })
                ),
                h('div', { className: 'painting-chrome-field' },
                  h('label', null, 'Message'),
                  h('div', { className: 'painting-chrome-input painting-chrome-input-tall' })
                ),
                h('span', { className: 'painting-chrome-submit' }, 'Send Message')
              )
            )
          )
        );
      },
    });

    CMS.registerPreviewTemplate('contact', ContactPreview);
  </script>
</body>
</html>
