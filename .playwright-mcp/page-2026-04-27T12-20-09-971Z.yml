        - generic [ref=e32]:
          - paragraph [ref=e33]: Sadaf Farasat is a self-taught artist whose work is deeply rooted in Sufism and inspired by the mystical poetry of Rumi. Her artistic journey is one of both creative and spiritual discovery—one that found clarity and purpose through engaging with Rumi’s verses.
          - paragraph [ref=e34]: Working intuitively, Sadaf has developed her practice through exploration and experimentation, free from the constraints of formal training. Her work is not confined to a single style, yet consistently revolves around themes of spirituality, devotion, and inner transformation. For her, painting is akin to Sema on canvas—a meditative act of movement and surrender.
          - paragraph [ref=e35]: Her large-scale works are characterised by bold strokes, luminous colours, and rich textures, primarily executed in oil. Using a range of tools—from brushes and palette knives to her hands—she approaches each canvas with a sense of freedom and immediacy. Each painting becomes a personal interpretation of Rumi’s poetry, reflecting her evolving understanding of his words.
          - paragraph [ref=e36]: Recurring motifs such as Whirling Dervishes and the moon emerge as symbols of love, devotion, and transcendence. Rooted in the Mevlevi tradition, these forms are approached with both reverence and authenticity, informed by guidance from practicing dervishes.
          - paragraph [ref=e37]: Sadaf’s work is a reflection of her inner journey—an exploration of self, spirit, and the search for the Divine. Through her art, she invites the viewer into a space of contemplation, where beauty, movement, and meaning intersect.
          - paragraph [ref=e38]: Today, her work resonates with a global audience, connecting her with collectors and seekers who are drawn to its spiritual depth and emotional intensity.
