        - heading "About the artist" [level=3] [ref=e115]
        - generic [ref=e117]:
          - paragraph [ref=e118]: Sadaf Farasat is a self-taught artist whose work is deeply rooted in Sufism and inspired by the mystical poetry of Rumi. Her artistic journey is one of both creative and spiritual discovery—one that found clarity and purpose through engaging with Rumi’s verses.
          - paragraph [ref=e119]: Working intuitively, Sadaf has developed her practice through exploration and experimentation, free from the constraints of formal training. Her work is not confined to a single style, yet consistently revolves around themes of spirituality, devotion, and inner transformation. For her, painting is akin to Sema on canvas—a meditative act of movement and surrender.
          - paragraph [ref=e120]: Her large-scale works are characterised by bold strokes, luminous colours, and rich textures, primarily executed in oil. Using a range of tools—from brushes and palette knives to her hands—she approaches each canvas with a sense of freedom and immediacy. Each painting becomes a personal interpretation of Rumi’s poetry, reflecting her evolving understanding of his words.
          - link "Read Full Biography" [ref=e121] [cursor=pointer]:
            - /url: /about
