[build]
  command = "npm run build"
  publish = "dist"
  # Skip ALL git-push builds (exit 0 = skip, 0 credits). Build-hook builds bypass
  # this command entirely and always proceed. Deploys are batched via the
  # GitHub Actions debounce workflow, which fires a build hook ~15 min after the
  # last publish. INCOMING_HOOK_TITLE is set only for hook-triggered builds.
  ignore = "if [ -n \"$INCOMING_HOOK_TITLE\" ]; then echo 'Hook build - proceeding' && exit 1; else echo 'Git-push build - skipping (debounced via GitHub Actions)' && exit 0; fi"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-lived immutable cache for raw source images. The Netlify Image CDN
# (/.netlify/images) fetches each original once per transform and edge-caches
# the resized/format-negotiated result (invalidated on deploy). Browsers that
# hit a raw /images/* path also cache hard. Safe because Decap uploads create
# new filenames rather than overwriting existing ones.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888

# Lighthouse plugin is installed via Netlify app — limit it to homepage only
# to prevent it from auditing all 222 prerendered pages and timing out the build.
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  [plugins.inputs]
    audits = [
      {path = "/"}
    ]
